name: Fetch video transcripts

# Pulls Arabic auto-subtitles for videos missing a transcript and stores them
# in Supabase. Runs nightly, and can be triggered manually from the Actions tab.
on:
  schedule:
    - cron: "30 3 * * *" # every day at 03:30 UTC
  workflow_dispatch:
    inputs:
      batch:
        description: "How many videos to process this run"
        required: false
        default: "60"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Install dependencies
        run: npm ci

      - name: Write YouTube cookies (optional, fixes bot-checks)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then printf '%s' "$YT_COOKIES" > cookies.txt; echo "cookies.txt written ($(wc -l < cookies.txt) lines)"; else echo "no YT_COOKIES secret set"; fi

      - name: Fetch transcripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TRANSCRIPT_BATCH: ${{ github.event.inputs.batch || '40' }}
          YTDLP_BIN: python
          YTDLP_PRE: "-m yt_dlp"
        run: node scripts/fetch-transcripts.mjs
